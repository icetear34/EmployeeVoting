<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投票活動 - 員工投票系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="employee.css">
</head>
<body>

<div id="screen-hub" class="screen active">
  <nav class="topbar">
    <span class="topbar-logo">VoteSystem</span>
    <span class="topbar-title" id="hub-nav-title">投票活動</span>
    <button class="topbar-action" onclick="doLogout()">登出</button>
  </nav>

  <div class="hub-wrap">
    <div class="hub-heading" id="hub-heading">載入中...</div>
    <div class="hub-sub" id="hub-sub"></div>

    <div id="all-voted-banner" class="all-voted-banner">
      <span style="font-size:22px">✓</span>
      <div>
        <strong>您已完成所有投票活動。</strong><br>
        <span style="color:var(--ink-3);font-size:13px">以下為各活動目前的即時得票佔比</span>
      </div>
    </div>

    <div id="hub-activities"></div>
  </div>

  <div id="hub-footer" class="hub-footer">
    <button class="btn" id="hub-submit-btn" onclick="openBulkConfirm()" disabled>送出所有投票</button>
    <div class="hub-footer-hint" id="hub-footer-hint">請先為每個活動選擇一位候選人</div>
  </div>
</div>

<!-- 確認投票 Modal -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">確認送出</div>
    <div class="modal-body" id="confirm-modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">取消</button>
      <button class="btn" id="confirm-submit-btn" onclick="submitVote()">確認送出</button>
    </div>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script src="employee.js"></script>
<script>
  // ═══════════════════════════════════════════════════════════════════════════
  // 狀態管理
  // ═══════════════════════════════════════════════════════════════════════════
  let employeeData = null;      // /me 回傳的資料
  let selectedMap = {};         // activityId → candidateId（已選擇但未送出）

  // ═══════════════════════════════════════════════════════════════════════════
  // 頁面初始化
  // ═══════════════════════════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', async () => {
    await initPage();
  });

  async function initPage() {
    // 確認登入狀態
    if (!CookieUtil.get('employee_logged_in')) {
      window.location.href = 'login.html';
      return;
    }

    await loadEmployeeData();
  }

  async function loadEmployeeData() {
    try {
      const response = await ApiUtil.get('/employee-auth/me');
      employeeData = response;
      renderHub();
    } catch (error) {
      if (error.status === 401) {
        CookieUtil.remove('employee_logged_in');
        window.location.href = 'login.html';
        return;
      }
      alert('載入失敗，請重新登入。');
      window.location.href = 'login.html';
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 畫面渲染
  // ═══════════════════════════════════════════════════════════════════════════
  function renderHub() {
    if (!employeeData) return;

    const activities = employeeData.activities || [];
    const pendingActivities = activities.filter(a => !a.hasVoted);
    const allVoted = activities.length > 0 && pendingActivities.length === 0;
    const noActivities = activities.length === 0;

    // 更新標題
    document.getElementById('hub-nav-title').textContent = allVoted ? '投票結果' : '投票活動';
    document.getElementById('hub-heading').textContent = noActivities
      ? '目前沒有進行中的投票活動'
      : allVoted
        ? '感謝您完成所有投票！'
        : '您有以下投票活動';
    document.getElementById('hub-sub').textContent = noActivities
      ? '您目前不在任何進行中活動的投票名單內，或活動尚未開始'
      : allVoted
        ? '以下為各活動的即時得票佔比'
        : '請在每個活動中選擇一位候選人，確認後送出投票';

    // 已全部投票完成的 banner
    const banner = document.getElementById('all-voted-banner');
    banner.classList.toggle('show', allVoted);

    // 渲染活動區塊
    const container = document.getElementById('hub-activities');
    container.innerHTML = '';

    if (noActivities) {
      container.innerHTML = `
        <div style="text-align:center;padding:48px 24px;color:var(--ink-3)">
          <div style="font-size:40px;margin-bottom:16px">📋</div>
          <div style="font-size:15px">請確認活動時間，或聯絡管理員</div>
        </div>
      `;
      return;
    }

    activities.forEach(act => {
      const block = createActivityBlock(act);
      container.appendChild(block);
    });

    // 更新底部按鈕狀態
    updateHubFooter(pendingActivities);
  }

  function createActivityBlock(act) {
    const hasVoted = act.hasVoted;

    const block = document.createElement('div');
    block.className = 'activity-block';

    // Header
    let badgeClass = hasVoted ? 'badge-voted' : 'badge-active';
    let badgeText = hasVoted ? '已投票' : '進行中';

    block.innerHTML = `
      <div class="activity-block-header">
        <div class="abh-left">
          <div class="abh-name">${UIUtil.escapeHtml(act.activityName)}</div>
          ${act.description ? `<div class="abh-desc">${UIUtil.escapeHtml(act.description)}</div>` : ''}
          <div class="abh-meta">${act.activityCode} · ${UIUtil.formatDateTime(act.startTime, false)} — ${UIUtil.formatDateTime(act.endTime, false)}</div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
    `;

    if (hasVoted) {
      // 已投票：顯示確認訊息
      const votedRow = document.createElement('div');
      votedRow.className = 'voted-row';
      votedRow.innerHTML = `
        <div class="voted-check">✓</div>
        <div style="font-size:14px"><strong>您已完成此活動的投票</strong></div>
      `;
      block.appendChild(votedRow);

      // 顯示得票佔比（後端判斷是否可查閱，有值才顯示）
      if (act.resultBars && act.resultBars.length > 0) {
        appendResultBars(block, act.resultBars);
      }
    } else {
      // 未投票：顯示候選人卡片
      const grid = document.createElement('div');
      grid.className = 'activity-candidates';

      (act.candidates || []).forEach(cand => {
        const card = document.createElement('div');
        card.className = 'candidate-card' + (selectedMap[act.activityId] === cand.id ? ' selected' : '');
        
        card.innerHTML = `
          <div class="cand-avatar">
            ${cand.imageUrl
              ? `<img src="${cand.imageUrl}" alt="${UIUtil.escapeHtml(cand.name)}">`
              : '<span>👤</span>'
            }
          </div>
          <div class="cand-info">
            <div class="cand-name">${UIUtil.escapeHtml(cand.name)}</div>
            ${cand.description ? `<div class="cand-desc">${UIUtil.escapeHtml(cand.description)}</div>` : ''}
          </div>
        `;
        
        card.onclick = () => selectCandidate(act.activityId, cand.id);
        grid.appendChild(card);
      });

      block.appendChild(grid);
    }

    return block;
  }

  function appendResultBars(block, bars) {
    const wrap = document.createElement('div');
    wrap.className = 'result-bar-wrap';

    wrap.innerHTML = '<div class="rb-header"><span>得票佔比</span></div>' +
      bars.map(bar => `
        <div class="rb-row">
          <div class="rb-name" title="${UIUtil.escapeHtml(bar.name)}">${UIUtil.escapeHtml(bar.name)}</div>
          <div class="rb-track">
            <div class="rb-fill" style="width:0%" data-pct="${bar.percent}"></div>
          </div>
          <div class="rb-pct">${bar.percent}%</div>
        </div>
      `).join('');

    block.appendChild(wrap);

    // 動畫顯示進度條
    setTimeout(() => {
      wrap.querySelectorAll('.rb-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 60);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 選擇候選人
  // ═══════════════════════════════════════════════════════════════════════════
  function selectCandidate(activityId, candidateId) {
    selectedMap[activityId] = candidateId;
    renderHub();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 底部按鈕狀態
  // ═══════════════════════════════════════════════════════════════════════════
  function updateHubFooter(pendingActivities) {
    const footer = document.getElementById('hub-footer');
    const btn = document.getElementById('hub-submit-btn');
    const hint = document.getElementById('hub-footer-hint');

    if (pendingActivities.length === 0) {
      footer.classList.remove('visible');
      return;
    }

    footer.classList.add('visible');

    const selectedCount = pendingActivities.filter(a => selectedMap[a.activityId]).length;

    if (selectedCount === 0) {
      btn.disabled = true;
      hint.textContent = '請先為每個活動選擇一位候選人';
    } else if (selectedCount < pendingActivities.length) {
      btn.disabled = false;
      const unselectedNames = pendingActivities
        .filter(a => !selectedMap[a.activityId])
        .map(a => a.activityName)
        .join('、');
      hint.textContent = `尚未選擇：${unselectedNames}`;
    } else {
      btn.disabled = false;
      hint.textContent = '';
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 確認投票
  // ═══════════════════════════════════════════════════════════════════════════
  function openBulkConfirm() {
    const activities = employeeData.activities || [];
    const toSubmit = activities.filter(a => !a.hasVoted && selectedMap[a.activityId]);
    
    if (toSubmit.length === 0) return;

    const lines = toSubmit.map(act => {
      const cand = act.candidates.find(c => c.id === selectedMap[act.activityId]);
      return `
        <div style="padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:12px;color:var(--ink-3)">${UIUtil.escapeHtml(act.activityName)}</span><br>
          <strong>${cand ? UIUtil.escapeHtml(cand.name) : '未知'}</strong>
        </div>
      `;
    }).join('');

    document.getElementById('confirm-modal-body').innerHTML = `
      <div style="margin-bottom:8px">確定送出以下投票？</div>
      ${lines}
      <div style="margin-top:12px;font-size:12px;color:var(--ink-3)">送出後無法修改</div>
    `;

    UIUtil.showModal('confirm-modal');
  }

  function closeConfirm() {
    UIUtil.closeModal('confirm-modal');
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 送出投票
  // ═══════════════════════════════════════════════════════════════════════════
  async function submitVote() {
    const activities = employeeData.activities || [];
    const toSubmit = activities.filter(a => !a.hasVoted && selectedMap[a.activityId]);
    
    if (toSubmit.length === 0) {
      closeConfirm();
      return;
    }

    const btn = document.getElementById('confirm-submit-btn');
    UIUtil.setLoading(btn, true);

    const votes = toSubmit.map(act => ({
      activityId: act.activityId,
      candidateId: selectedMap[act.activityId]
    }));

    try {
      await ApiUtil.post('/employee-vote/submit-batch', { votes });

      selectedMap = {};
      closeConfirm();

      // 重新從後端取得最新資料（含 resultBars）
      await loadEmployeeData();

    } catch (error) {
      alert(error.message || '投票失敗，請重試。');
    } finally {
      UIUtil.setLoading(btn, false);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // 登出
  // ═══════════════════════════════════════════════════════════════════════════
  async function doLogout() {
    try {
      await ApiUtil.post('/employee-auth/logout', {});
    } catch (error) {
      // 忽略登出錯誤
    }

    CookieUtil.remove('employee_logged_in');
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
