<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工登入 - 員工投票系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="employee.css">
</head>
<body>

<div id="screen-login" class="screen active">
  <nav class="topbar">
    <span class="topbar-logo">VoteSystem</span>
    <span class="topbar-title">員工投票</span>
    <a href="../admin/login.html" class="topbar-action">後台管理</a>
  </nav>

  <div class="center-wrap">
    <div class="card" style="max-width:400px;width:100%">
      <div class="card-body">
        <h2 style="text-align:center;margin-bottom:6px;font-weight:500">員工登入</h2>
        <p style="text-align:center;font-size:13px;color:var(--ink-3);margin-bottom:24px">請輸入工號、生日與驗證碼</p>

        <div id="login-error" class="error-banner"></div>

        <form id="login-form" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label for="emp-no">工號</label>
            <input type="text" id="emp-no" class="form-input" placeholder="例：1233C00" maxlength="20" required autocomplete="username">
          </div>

          <div class="form-group">
            <label for="emp-birth">生日</label>
            <input type="text" id="emp-birth" class="form-input" placeholder="例：19900115（yyyyMMdd）" maxlength="8" required autocomplete="bday">
          </div>

          <div class="form-group">
            <label for="emp-captcha">驗證碼</label>
            <div class="captcha-row">
              <input type="text" id="emp-captcha" class="form-input" placeholder="請輸入驗證碼" maxlength="4" required autocomplete="off">
              <div class="captcha-box" id="captcha-display" onclick="refreshCaptcha()" title="點擊更換"></div>
            </div>
          </div>

          <button type="submit" class="btn" id="login-btn">登入</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script src="employee.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    checkExistingSession();
    refreshCaptcha();
  });

  async function checkExistingSession() {
    const session = CookieUtil.get('employee_session');
    if (session) {
      try {
        await ApiUtil.get('/employee-auth/me');
        window.location.href = 'vote.html';
      } catch (error) {
        CookieUtil.remove('employee_session');
      }
    }
  }

  async function refreshCaptcha() {
    const display = document.getElementById('captcha-display');
    try {
      const result = await CaptchaUtil.fetch('/employee-auth/captcha');
      display.innerHTML = `<img src="${result.imageDataUrl}" alt="驗證碼">`;
    } catch (error) {
      const result = CaptchaUtil.generateLocal();
      display.innerHTML = `<img src="${result.imageDataUrl}" alt="驗證碼">`;
    }
  }

  async function handleLogin(event) {
    event.preventDefault();

    const errorEl = document.getElementById('login-error');
    UIUtil.hideError('login-error');

    const employeeNo  = document.getElementById('emp-no').value.trim();
    const birthDate   = document.getElementById('emp-birth').value.trim();
    const captchaCode = document.getElementById('emp-captcha').value.trim();
    const btn         = document.getElementById('login-btn');

    if (!employeeNo || !birthDate || !captchaCode) {
      UIUtil.showError('login-error', '請填寫所有欄位');
      return false;
    }

    if (!/^\d{8}$/.test(birthDate)) {
      UIUtil.showError('login-error', '生日格式錯誤，請輸入 8 碼數字（yyyyMMdd）');
      return false;
    }

    if (CaptchaUtil.currentKey?.startsWith('local-')) {
      if (!CaptchaUtil.verifyLocal(captchaCode)) {
        UIUtil.showError('login-error', '驗證碼錯誤，請重試');
        refreshCaptcha();
        document.getElementById('emp-captcha').value = '';
        return false;
      }
    }

    UIUtil.setLoading(btn, true);

    try {
      const response = await ApiUtil.post('/employee-auth/login', {
        employeeNo,
        birthDate,
        captchaId:   CaptchaUtil.getKey(),
        captchaCode: captchaCode.toUpperCase()
      });

      if (response.sessionToken) {
        CookieUtil.set('employee_session', response.sessionToken);
      }
      // employee_logged_in 由後端 Set-Cookie 設定，直接跳轉
      window.location.href = 'vote.html';

    } catch (error) {
      UIUtil.showError('login-error', error.message || '登入失敗，請重試');
      refreshCaptcha();
      document.getElementById('emp-captcha').value = '';
    } finally {
      UIUtil.setLoading(btn, false);
    }

    return false;
  }
</script>

</body>
</html>
