<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理員登入 - 員工投票系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="screen active">
  <nav class="topbar">
    <span class="topbar-logo">VoteSystem</span>
    <span class="topbar-title">管理員登入</span>
    <a href="../employee/login.html" class="topbar-action">員工投票入口</a>
  </nav>

  <div class="container">
    <div class="card" style="max-width:400px;margin:80px auto;">
      <div class="card-body">
        <h2 style="text-align:center;margin-bottom:24px;font-weight:500">管理員登入</h2>

        <div id="login-error" class="banner banner-error" style="display:none"></div>

        <form id="login-form" onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label>帳號</label>
            <input type="text" id="username" class="form-input" placeholder="請輸入帳號" required autocomplete="username">
          </div>

          <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" class="form-input" placeholder="請輸入密碼" required autocomplete="current-password">
          </div>

          <div class="form-group">
            <label>驗證碼</label>
            <div class="captcha-row">
              <input type="text" id="captcha-code" class="form-input" placeholder="請輸入驗證碼" maxlength="4" required autocomplete="off">
              <div class="captcha-box" onclick="refreshCaptcha()" title="點擊更換">
                <img id="captcha-img" src="" alt="驗證碼">
              </div>
            </div>
          </div>

          <button type="submit" id="login-btn" class="btn" style="width:100%">登入</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script>
  let captchaKey = '';

  document.addEventListener('DOMContentLoaded', async () => {
    // 嘗試呼叫 /me 確認是否已登入（靠 HttpOnly Cookie）
    try {
      await ApiUtil.get('/admin-auth/me');
      window.location.href = 'activities.html';
      return;
    } catch (e) {
      // 未登入，顯示登入頁
    }
    refreshCaptcha();
  });

  async function refreshCaptcha() {
    const result = await CaptchaUtil.fetch();
    captchaKey = result.key;
    document.getElementById('captcha-img').src = result.imageDataUrl;
    document.getElementById('captcha-code').value = '';
  }

  async function handleLogin(event) {
    event.preventDefault();
    const errorEl = document.getElementById('login-error');
    errorEl.style.display = 'none';

    const account = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const captchaCode = document.getElementById('captcha-code').value.trim();

    if (!account || !password || !captchaCode) {
      errorEl.textContent = '請填寫所有欄位';
      errorEl.style.display = 'block';
      return false;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = '登入中...';

    try {
      const resp = await ApiUtil.post('/admin-auth/login', {
        account, password, captchaId: captchaKey, captchaCode
      });
      // 後端已設 HttpOnly Cookie，直接跳轉
      window.location.href = 'activities.html';
    } catch (err) {
      errorEl.textContent = err.message || '登入失敗';
      errorEl.style.display = 'block';
      refreshCaptcha();
    } finally {
      btn.disabled = false;
      btn.textContent = '登入';
    }
    return false;
  }
</script>
</body>
</html>
